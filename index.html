<!doctype html>
<html lang="ko">
  <head>
    <!-- 기본 문서 메타 -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schopenhauer Chat</title>

    <!-- 웹폰트(Inter) 사전 연결 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- 앱 스타일 -->
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <!-- 앱 전체 컨테이너 -->
    <main class="app" aria-label="쇼펜하우어 챗봇">
      <!-- 상단 바: 브랜드 + 독설 레벨 + 초기화 버튼 -->
      <header class="topbar">
        <div class="brand">
          <!-- 브랜드 아이콘(쇼펜하우어 이미지) -->
          <div class="sigil">
            <img src="/static/쇼펜하우어 이미지.png" alt="쇼펜하우어 초상" />
          </div>

          <!-- 브랜드 텍스트 -->
          <div class="brand__text">
            <div class="brand__title">나는야 독설가 쇼펜하우어(팩트폭행 당해 볼텐가?)</div>
            <div class="brand__subtitle">의지와 표상 — 대화</div>
          </div>
        </div>
        <div class="actions">
          <!-- 독설 레벨 토글 -->
          <div class="heat" role="group" aria-label="독설 레벨">
            <button class="heat__btn" type="button" data-heat="1" aria-pressed="false">
              <span class="heat__lv">Lv1</span>
              <span class="heat__label">현실 조언</span>
            </button>
            <button class="heat__btn" type="button" data-heat="3" aria-pressed="false">
              <span class="heat__lv">Lv3</span>
              <span class="heat__label">냉정한 분석</span>
            </button>
            <button class="heat__btn" type="button" data-heat="5" aria-pressed="false">
              <span class="heat__lv">Lv5</span>
              <span class="heat__label">인격 해체 수준</span>
            </button>
          </div>

          <!-- 대화 히스토리 초기화 -->
          <button class="btn btn--ghost" id="resetBtn" type="button">대화 초기화</button>
        </div>
      </header>

      <!-- 메시지 출력 영역 -->
      <section class="panel" aria-label="대화">
        <div
          class="messages"
          id="messages"
          role="log"
          aria-live="polite"
          aria-relevant="additions"
        ></div>
      </section>

      <!-- 빠른 주제 선택(클릭 시 입력창 자동 채움) -->
      <section class="quickbar" aria-label="빠른 주제 선택">
        <div class="quickbar__row" role="list">
          <!-- 주제 1: 인간관계 -->
          <button class="chip" type="button" data-quick="인간관계">
            <span class="chip__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M9 11a4 4 0 1 1 8 0"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path
                  d="M4.5 20a6.5 6.5 0 0 1 6.5-6.5h2a6.5 6.5 0 0 1 6.5 6.5"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="chip__text">인간관계</span>
          </button>

          <!-- 주제 2: 돈/미래 -->
          <button class="chip" type="button" data-quick="돈/미래">
            <span class="chip__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M7 7h10a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-4a3 3 0 0 1 3-3Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M12 10v4m-2-2h4"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="chip__text">돈/미래</span>
          </button>

          <!-- 주제 3: 사랑/집착 -->
          <button class="chip" type="button" data-quick="사랑/집착">
            <span class="chip__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M12 20s-7-4.5-9.2-8.8C1.2 7.9 3.2 5 6.4 5c1.6 0 2.9.7 3.6 1.8C10.7 5.7 12 5 13.6 5c3.2 0 5.2 2.9 3.6 6.2C19 15.5 12 20 12 20Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M10 9l4 6"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="chip__text">사랑/집착</span>
          </button>

          <!-- 주제 4: 무기력 -->
          <button class="chip" type="button" data-quick="무기력">
            <span class="chip__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M7 8V6a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path
                  d="M6 8h12v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V8Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linejoin="round"
                />
                <path
                  d="M9 12h6"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="chip__text">무기력</span>
          </button>

          <!-- 주제 5: 그냥 다 싫음 -->
          <button class="chip" type="button" data-quick="그냥 다 싫음">
            <span class="chip__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M12 22a10 10 0 1 0-10-10 10 10 0 0 0 10 10Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                />
                <path
                  d="M8.5 10.5h.01M15.5 10.5h.01"
                  stroke="currentColor"
                  stroke-width="2.4"
                  stroke-linecap="round"
                />
                <path
                  d="M8.5 16h7"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
              </svg>
            </span>
            <span class="chip__text">그냥 다 싫음</span>
          </button>
        </div>
      </section>

      <!-- 입력/전송 영역 -->
      <form class="composer" id="composer" autocomplete="off">
        <!-- 스크린리더용 라벨 -->
        <label class="sr-only" for="prompt">메시지 입력</label>
        <input
          id="prompt"
          class="composer__input"
          name="prompt"
          type="text"
          placeholder="인생에 대한 핑계 한번 적어봐라."
          maxlength="800"
          required
        />

        <!-- 전송 버튼(장미 아이콘) -->
        <button class="btn btn--primary btn--icon" type="submit" id="sendBtn" aria-label="보내기">
          <img class="icon" src="/static/장미 이미지.png" alt="" aria-hidden="true" />
          <span class="sr-only">보내기</span>
        </button>
      </form>

      <!-- 하단 안내 문구 -->
      <footer class="footnote">
        <span class="dot" aria-hidden="true"></span>
        <span>모든 대화에서 느끼는 불편함은 전부 너의 책임입니다.</span>
      </footer>
    </main>

    <!-- 앱 동작 스크립트 -->
    <script src="/static/app.js"></script>
  </body>
</html>
